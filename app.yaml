runtime: python312

instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 2

handlers:
  - url: /static
    static_dir: static

  - url: /.*
    script: auto
    secure: always
    login: required

# IAP configuration (enable in Google Cloud Console):
# gcloud app update --iap-enabled
#
# Secret Manager setup:
# All runtime secrets are stored in Google Cloud Secret Manager.
# Required secrets: TIBBER_TOKEN, AUDI_USERNAME, AUDI_PASSWORD,
# HOME_STOP_ID, YR_LAT, YR_LON, HOME_LAT, HOME_LON,
# GOOGLE_API_KEY, CALENDAR_IDS
# See README.md for the full setup steps.
