runtime: python312

instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 2

env_variables:
  # GCP project ID used by the Secret Manager client.
  # App Engine sets GOOGLE_CLOUD_PROJECT automatically; keep this as an
  # explicit override in case you deploy from a different project.
  GOOGLE_CLOUD_PROJECT: ""

handlers:
  - url: /static
    static_dir: static

  - url: /.*
    script: auto
    secure: always
    login: required

# IAP configuration (enable in Google Cloud Console):
# gcloud app update --iap-enabled
#
# Secret Manager setup:
# All runtime secrets (TIBBER_TOKEN, AUDI_USERNAME, AUDI_PASSWORD,
# HOME_STOP_ID, YR_LAT, YR_LON) are stored in Google Cloud Secret Manager.
# See README.md for the full setup steps.
