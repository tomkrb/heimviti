runtime: python312

instance_class: F1

automatic_scaling:
  min_instances: 0
  max_instances: 2

env_variables:
  # Set these in the App Engine environment or via Secret Manager
  TIBBER_TOKEN: ""
  AUDI_USERNAME: ""
  AUDI_PASSWORD: ""
  # Stop latitude/longitude for ATB bus departures (Trondheim default)
  HOME_STOP_ID: ""
  # Location for yr.no weather (Trondheim default)
  YR_LAT: "63.4305"
  YR_LON: "10.3951"

handlers:
  - url: /static
    static_dir: static

  - url: /.*
    script: auto
    secure: always
    login: required

# IAP configuration (enable in Google Cloud Console):
# gcloud app update --iap-enabled
